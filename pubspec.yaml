name: zwesta_trading
description: Zwesta Trading System Flutter Application with login, dashboard, trades, and account management.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.0.0
  
  # API and HTTP
  http: ^1.1.0
  
  # Local storage
  shared_preferences: ^2.2.0
  
  # Date and time
  intl: ^0.18.1
  
  # Charts
  fl_chart: ^0.65.0
  
  # Material Design 3
  cupertino_icons: ^1.0.2
  
  # Loading and shimmer effects
  shimmer: ^3.0.0
  
  # Navigation  
  go_router: ^12.0.0

  
  # File handling
  path_provider: ^2.1.0
  
  # Logging and Analytics
  logger: ^2.0.0
  
  # Environment configuration
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
