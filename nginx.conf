# Nginx Configuration for Flutter Web Application
# Place this file at: /etc/nginx/sites-available/zwesta

upstream zwesta_backend {
    server localhost:8080;
    keepalive 64;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.zwesta.com www.zwesta.com;
    
    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Configuration
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.zwesta.com;
    
    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/api.zwesta.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.zwesta.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    
    # Modern SSL protocols
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    
    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    
    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # CORS Headers (adjust origins as needed)
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
    
    # Handle OPTIONS requests
    if ($request_method = 'OPTIONS') {
        return 200;
    }
    
    # Disable cache for API calls
    location /api/ {
        proxy_pass http://zwesta_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
        proxy_connect_timeout 30s;
        
        # No caching for API
        add_header Cache-Control "no-cache, no-store, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    
    # Static files with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|wasm|woff|woff2|ttf|eot)$ {
        root /var/www/zwesta-trading;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Service worker
    location /flutter_service_worker.js {
        root /var/www/zwesta-trading;
        expires 0;
        add_header Cache-Control "no-cache, no-store, must-revalidate, proxy-revalidate";
        add_header Service-Worker-Allowed "/";
    }
    
    # Manifest file
    location /manifest.json {
        root /var/www/zwesta-trading;
        expires 1d;
        add_header Cache-Control "public";
        types { application/manifest+json json; }
    }
    
    # Asset manifest files
    location /assets/ {
        root /var/www/zwesta-trading;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript application/wasm;
    gzip_comp_level 6;
    gzip_disable "msie6";
    
    # HTML files - no caching, always serve fresh
    location ~* \.html$ {
        root /var/www/zwesta-trading;
        expires 0;
        add_header Cache-Control "max-age=0, no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    
    # Redirect to index.html for SPA routing
    location / {
        root /var/www/zwesta-trading;
        try_files $uri $uri/ /index.html;
        
        # Cache control
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        
        # Security
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
    }
    
    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Deny access to env files
    location ~ /\.env {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Logging
    access_log /var/log/nginx/zwesta-trading-access.log;
    error_log /var/log/nginx/zwesta-trading-error.log;
    
    # Client upload limits
    client_max_body_size 100M;
    
    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
}

# Redirect www to non-www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.api.zwesta.com;
    
    ssl_certificate /etc/letsencrypt/live/api.zwesta.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.zwesta.com/privkey.pem;
    
    return 301 https://api.zwesta.com$request_uri;
}
