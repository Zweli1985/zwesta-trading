# Nginx Configuration for Zwesta Trading System
# For HTTP (Development/Testing)
# Copy to: /etc/nginx/sites-available/zwesta-trading

upstream flutter_app {
    server 127.0.0.1:8080;
}

# Redirect HTTP to HTTPS (optional - comment out for HTTP only)
# server {
#     listen 80;
#     listen [::]:80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

# Main server block
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    
    # For HTTPS (uncomment when you have SSL):
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;

    server_name _;
    
    # Root directory for Flutter web build
    root /var/www/zwesta-trading;
    index index.html;

    # Logging
    access_log /var/log/nginx/zwesta-access.log;
    error_log /var/log/nginx/zwesta-error.log;

    # ===== GZIP COMPRESSION =====
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/atom+xml image/svg+xml;

    # ===== SECURITY HEADERS =====
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ===== CACHE SETTINGS =====
    
    # Cache static assets for 30 days
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache versioned/hashed files indefinitely
    location ~* \.[0-9a-f]{8,}\.(js|css)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache HTML and JSON
    location ~* \.(html|json)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ===== ASSETS SERVING =====
    
    # Serve Flutter assets
    location /assets/ {
        try_files $uri =404;
        access_log off;
    }

    # Serve CanvasKit (graphics library)
    location /canvaskit/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Serve Flutter JS files
    location ~* \.dart\.js$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    location ~* flutter_service_worker\.js$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ===== API ROUTING (if backend on same server) =====
    # Uncomment and configure if backend API is on same server
    # location /api/ {
    #     proxy_pass http://flutter_app;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection 'upgrade';
    #     proxy_set_header Host $host;
    #     proxy_cache_bypass $http_upgrade;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # ===== SPA ROUTING =====
    # All routing goes through Flutter - must be last location block
    location / {
        # Try to serve file directly, if not found try as directory, 
        # if not found send to index.html
        try_files $uri $uri/ /index.html;
        
        # For HTML files
        if ($request_filename ~* ^.*?\.html?$) {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # ===== DENY ACCESS =====
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ===== SETUP INSTRUCTIONS =====
# 1. Copy this file to:
#    sudo cp nginx-http.conf /etc/nginx/sites-available/zwesta-trading
#
# 2. Enable the site:
#    sudo ln -s /etc/nginx/sites-available/zwesta-trading /etc/nginx/sites-enabled/
#
# 3. Test configuration:
#    sudo nginx -t
#
# 4. Reload Nginx:
#    sudo systemctl reload nginx
#
# 5. Check status:
#    sudo systemctl status nginx
#
# 6. View logs:
#    sudo tail -f /var/log/nginx/zwesta-access.log
#    sudo tail -f /var/log/nginx/zwesta-error.log
#
# ===== UPGRADE TO HTTPS =====
# 1. Install Certbot:
#    sudo apt-get install certbot python3-certbot-nginx
#
# 2. Get certificate:
#    sudo certbot certonly --nginx -d your-domain.com
#
# 3. Uncomment SSL sections in this file
#
# 4. Reload:
#    sudo systemctl reload nginx
